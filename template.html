<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Earnings Calendar</title>
<style>
:root{
  --bg:#0d0e10;--surface:#16181c;--surface2:#1e2025;--surface3:#252730;
  --border:#2a2c33;--border2:#333540;
  --text:#e2e4ea;--muted:#8b8f9e;--faint:#4a4d5a;
  --green:#22c55e;--green-bg:rgba(34,197,94,.12);
  --red:#ef4444;--red-bg:rgba(239,68,68,.12);
  --accent:#7c3aed;--accent2:#a78bfa;--accent-bg:rgba(124,58,237,.15);
  --amber:#f59e0b;--blue:#3b82f6;
  --rs:8px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:14px;overflow:hidden;height:100vh}
.navbar{height:52px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:12px;flex-shrink:0;z-index:50;position:relative}
.nav-logo{font-size:16px;font-weight:800;letter-spacing:-.5px;color:var(--text);white-space:nowrap}
.nav-logo span{color:var(--accent2)}
.nav-links{display:flex;gap:2px}
.nav-link{padding:5px 10px;border-radius:6px;font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;border:none;background:none;font-family:inherit}
.nav-link:hover,.nav-link.on{color:var(--text);background:var(--surface2)}
.nav-search{flex:1;max-width:260px;position:relative}
.nav-search input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:6px 12px 6px 30px;font-size:12px;color:var(--text);outline:none;font-family:inherit}
.nav-search input::placeholder{color:var(--faint)}
.nav-si{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--faint);font-size:13px;pointer-events:none}
.nav-right{margin-left:auto;display:flex;align-items:center;gap:10px;font-size:11px;color:var(--muted)}
.market-dot{width:7px;height:7px;border-radius:50%;background:var(--red);flex-shrink:0;display:inline-block}
.market-dot.open{background:var(--green)}
.main{display:flex;height:calc(100vh - 52px)}
.cal-section{flex:1;overflow-y:auto;padding:16px;min-width:0}
.right-panel{width:360px;flex-shrink:0;border-left:1px solid var(--border);overflow-y:auto;display:flex;flex-direction:column;background:var(--surface)}
.week-nav{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.wbtn{width:28px;height:28px;border-radius:50%;background:var(--surface);border:1px solid var(--border2);cursor:pointer;color:var(--muted);font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0;line-height:1}
.wbtn:hover{border-color:var(--accent2);color:var(--text)}
.week-lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--faint)}
.week-range{font-size:16px;font-weight:700;color:var(--text)}
.today-btn{padding:4px 10px;border-radius:12px;border:1px solid var(--border2);background:none;font-size:11px;color:var(--muted);cursor:pointer;font-family:inherit}
.today-btn:hover{border-color:var(--accent2);color:var(--accent2)}
.week-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
.day-col{background:var(--surface);border-radius:var(--rs);padding:10px;display:flex;flex-direction:column;gap:6px;border:1px solid var(--border);min-height:120px}
.day-col.today-col{border-color:var(--accent);background:rgba(124,58,237,.04)}
.day-hd{font-size:12px;font-weight:700;color:var(--muted);padding-bottom:6px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px}
.day-hd.today-hd{color:var(--accent2)}
.day-num{width:22px;height:22px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:12px;font-weight:800}
.today-num{background:var(--accent);color:#fff}
.sec-hd{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:var(--faint);margin-top:4px;display:flex;align-items:center;gap:3px}
.logos-wrap{display:flex;flex-wrap:wrap;gap:4px;margin-top:2px}
.logo-card{display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;padding:4px;border-radius:6px;transition:background .1s}
.logo-card:hover{background:var(--surface2)}
.logo-card.sel{background:var(--accent-bg);outline:1px solid var(--accent)}
.logo-img-wrap{width:42px;height:42px;border-radius:8px;overflow:hidden;background:var(--surface2);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;position:relative}
.logo-img-wrap img{width:100%;height:100%;object-fit:contain;position:absolute;top:0;left:0}
.logo-fb{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff}
.logo-sym{font-size:10px;font-weight:700;color:var(--text);text-align:center;max-width:48px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.no-earn{color:var(--faint);font-size:11px;text-align:center;padding:16px 0;flex:1;display:flex;align-items:center;justify-content:center}
.more-lbl{font-size:9px;color:var(--faint);padding:4px 2px;align-self:flex-end}
/* Right panel prices */
.rp-prices{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;padding:10px;border-bottom:1px solid var(--border);flex-shrink:0}
.price-box{background:var(--surface2);border-radius:6px;padding:7px 8px}
.price-sym{font-size:9px;font-weight:800;color:var(--faint);text-transform:uppercase;letter-spacing:.06em}
.price-val{font-size:13px;font-weight:700;color:var(--text);margin-top:2px}
.price-chg{font-size:10px;margin-top:1px}
.up{color:var(--green)}.dn{color:var(--red)}.flat{color:var(--muted)}
/* Feed */
.feed-hd{padding:10px 12px 8px;font-size:13px;font-weight:700;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.feed-sub{font-size:10px;color:var(--faint);font-weight:400}
.feed-item{padding:10px 12px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s}
.feed-item:hover{background:var(--surface2)}
.fi-head{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.fi-logo{width:32px;height:32px;border-radius:6px;overflow:hidden;background:var(--surface2);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;flex-shrink:0;position:relative}
.fi-logo img{width:100%;height:100%;object-fit:contain;position:absolute}
.fi-logo-fb{font-size:9px;font-weight:800;color:#fff;z-index:1}
.fi-title{font-size:12px;font-weight:600}
.fi-sub{font-size:10px;color:var(--faint);margin-top:1px}
.fi-grid{display:grid;grid-template-columns:32px 1fr 1fr 40px;gap:3px;font-size:10px}
.fi-lbl{color:var(--faint);font-weight:700;display:flex;align-items:center}
.fi-est{color:var(--muted)}
.fi-act{font-weight:600}
.fi-surp{font-weight:700;text-align:right}
/* Stock Detail */
.sd{flex:1;display:flex;flex-direction:column;overflow:hidden}
/* EarningsHub-style card */
.ec-card{margin:12px;border-radius:12px;background:var(--surface2);border:1px solid var(--border2);flex-shrink:0;overflow:hidden}
.ec-card-head{display:flex;align-items:center;gap:10px;padding:12px 12px 10px}
.ec-card-logo{width:44px;height:44px;border-radius:10px;overflow:hidden;background:#fff;border:1px solid #e5e7eb;display:flex;align-items:center;justify-content:center;flex-shrink:0;position:relative}
.ec-card-logo img{width:100%;height:100%;object-fit:contain;position:absolute;top:0;left:0}
.ec-card-logo-fb{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#fff}
.ec-card-title{flex:1;min-width:0}
.ec-card-name{font-size:15px;font-weight:700;color:var(--text);line-height:1.2}
.ec-card-ago{font-size:11px;color:var(--muted);margin-top:2px}
.ec-card-menu{background:none;border:none;color:var(--muted);cursor:pointer;font-size:18px;padding:2px 4px;letter-spacing:1px;line-height:1}
.ec-card-x{width:24px;height:24px;border-radius:50%;border:1px solid var(--border2);background:none;color:var(--muted);cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ec-card-x:hover{background:var(--surface);color:var(--text)}
/* Card tabs */
.ec-card-tabs{display:flex;border-bottom:1px solid var(--border);margin:0 0 0 0}
.ec-card-tab{flex:1;text-align:center;padding:9px 8px;font-size:12px;font-weight:600;color:var(--muted);cursor:default;border-bottom:2px solid transparent;display:flex;align-items:center;justify-content:center;gap:5px}
.ec-card-tab.on{color:var(--text);border-bottom-color:var(--text)}
.pro-badge{font-size:9px;font-weight:700;background:rgba(245,158,11,.18);color:var(--amber);border-radius:4px;padding:1px 4px;letter-spacing:.03em}
/* REV / EPS rows */
.ec-results{padding:4px 0}
.ec-row{display:grid;grid-template-columns:52px 1fr 1fr 56px;align-items:center;padding:10px 14px;gap:4px}
.ec-row-divider{height:1px;background:var(--border);margin:0 14px}
.ec-metric{font-size:13px;font-weight:700;color:var(--text)}
.ec-est{font-size:12px;color:var(--muted)}
.ec-actual{font-size:14px;font-weight:700;color:var(--text)}
.ec-surp{font-size:13px;font-weight:700;text-align:right}
.ec-footnote{font-size:10px;color:var(--faint);padding:0 14px 10px;line-height:1.4}
/* Action buttons */
.ec-actions{display:flex;align-items:center;gap:6px;padding:8px 12px 12px;border-top:1px solid var(--border)}
.ec-play{width:36px;height:36px;border-radius:50%;background:#fff;border:none;color:#000;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ec-play:hover{background:#e5e7eb}
.ec-act-btn{display:flex;align-items:center;gap:4px;background:rgba(255,255,255,.06);border:1px solid var(--border2);border-radius:8px;padding:5px 9px;font-size:11px;font-weight:600;color:var(--muted);cursor:not-allowed;white-space:nowrap;font-family:inherit}
.plus-badge{font-size:9px;font-weight:700;background:rgba(124,58,237,.25);color:var(--accent2);border-radius:4px;padding:1px 4px}
.ec-share{width:32px;height:32px;border-radius:8px;background:rgba(255,255,255,.06);border:1px solid var(--border2);color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;margin-left:auto;flex-shrink:0}
/* Summary metrics strip below card */
.sd-metrics-strip{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;padding:0 12px 8px;flex-shrink:0}
.met{background:var(--surface2);border-radius:6px;padding:6px 7px}
.met-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--faint)}
.met-val{font-size:12px;font-weight:700;margin-top:2px}
/* Existing logo fallback reused */
.sd-logo-fb{font-size:14px;font-weight:800;color:#fff;z-index:1}
.sd-tabs{display:flex;border-bottom:1px solid var(--border);padding:0 12px;flex-shrink:0}
.sd-tab{padding:8px 10px;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:color .1s}
.sd-tab:hover{color:var(--text)}
.sd-tab.on{color:var(--accent2);border-bottom-color:var(--accent2)}
.sd-pane{display:none;overflow-y:auto;flex:1}.sd-pane.on{display:block}
/* Chart */
.chart-wrap{padding:12px 12px 6px}
.chart-legend{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.leg{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--muted)}
.leg-dot{width:8px;height:8px;border-radius:2px}
.chart-canvas-wrap{width:100%;height:155px}
canvas.ec{display:block;width:100%;height:155px}
/* History table */
.hist-wrap{padding:0 12px 12px}
.beat-stat{background:var(--surface2);border-radius:6px;padding:6px 8px;font-size:11px;color:var(--muted);margin-bottom:8px}
.beat-stat strong{color:var(--text)}
table.ht{width:100%;border-collapse:collapse;font-size:11px}
.ht th{text-align:left;font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--faint);padding:5px 5px;border-bottom:1px solid var(--border)}
.ht th.r,.ht td.r{text-align:right}
.ht td{padding:5px 5px;border-bottom:1px solid var(--border);color:var(--text)}
.ht tr:last-child td{border-bottom:none}
.ht tr:hover td{background:var(--surface2)}
.beat{color:var(--green);font-weight:700}.miss{color:var(--red);font-weight:700}
/* News */
.news-wrap{padding:8px 12px}
.ni{padding:8px 0;border-bottom:1px solid var(--border)}
.ni:last-child{border-bottom:none}
.ni a{font-size:12px;font-weight:500;color:var(--text);text-decoration:none;line-height:1.4;display:block}
.ni a:hover{color:var(--accent2)}
.ni-meta{font-size:10px;color:var(--faint);margin-top:3px}
/* Upcoming banner */
.uc-banner{background:rgba(124,58,237,.12);border:1px solid var(--accent);border-radius:var(--rs);padding:10px 12px;margin:12px 12px 0;display:flex;align-items:center;justify-content:space-between}
.uc-l{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--accent2);opacity:.7}
.uc-v{font-size:12px;font-weight:600;color:var(--accent2);margin-top:2px}
.uc-big{font-size:18px;font-weight:800;color:var(--accent2);margin-top:2px}
.no-data{padding:20px;text-align:center;color:var(--faint);font-size:12px}
/* Quarter slides */
.slides-wrap{overflow-x:auto;display:flex;gap:8px;padding:10px 12px 6px;scrollbar-width:none;-webkit-overflow-scrolling:touch;scroll-snap-type:x mandatory}
.slides-wrap::-webkit-scrollbar{display:none}
.qslide{flex:0 0 148px;background:var(--surface2);border-radius:10px;padding:10px 11px;scroll-snap-align:start;border:1px solid var(--border);min-height:130px;display:flex;flex-direction:column;gap:5px}
.qslide.upcoming{flex:0 0 160px;background:rgba(124,58,237,.10);border-color:var(--accent)}
.qslide-lbl{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--faint)}
.qslide-qtr{font-size:13px;font-weight:700;color:var(--text);margin-bottom:2px}
.qslide-badge{display:inline-block;font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;padding:2px 6px;border-radius:20px;margin-bottom:2px}
.qslide-badge.beat{background:rgba(34,197,94,.18);color:var(--green)}
.qslide-badge.miss{background:rgba(239,68,68,.15);color:var(--red)}
.qslide-badge.upcoming-badge{background:rgba(124,58,237,.25);color:var(--accent2)}
.qslide-row{display:flex;justify-content:space-between;align-items:baseline;font-size:11px}
.qslide-row-lbl{color:var(--faint);font-size:10px}
.qslide-row-val{font-weight:700;color:var(--text)}
.qslide-row-val.blue{color:var(--blue)}
.qslide-row-val.muted{color:var(--muted);font-weight:400}
.qslide-surp{font-size:11px;font-weight:700;margin-top:1px}
.slides-beat-stat{font-size:10px;color:var(--muted);padding:0 12px 4px;text-align:right}
.slides-beat-stat strong{color:var(--text)}
/* Live price strip in card */
.ec-price-strip{display:flex;align-items:baseline;gap:8px;padding:0 14px 10px;border-bottom:1px solid var(--border)}
.ec-price-val{font-size:22px;font-weight:800;color:var(--text)}
.ec-price-chg{font-size:13px;font-weight:700}
.ec-price-loading{font-size:12px;color:var(--faint);padding:0 14px 10px}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
</style>
</head>
<body>
<nav class="navbar">
  <div class="nav-logo">EARNINGS <span>CAL</span></div>
  <div class="nav-links">
    <button class="nav-link on">Calendar</button>
  </div>
  <div class="nav-search">
    <span class="nav-si">&#9906;</span>
    <input type="text" placeholder="Search ticker..." id="searchBox" oninput="doSearch(this.value)" autocomplete="off">
  </div>
  <div class="nav-right">
    <span id="builtLbl"></span>
    <span class="market-dot" id="mktDot"></span>
    <span id="mktTxt"></span>
  </div>
</nav>
<div class="main">
  <div class="cal-section">
    <div class="week-nav">
      <button class="wbtn" onclick="changeWeek(-1)">&#8249;</button>
      <div>
        <div class="week-lbl">Earnings Calendar</div>
        <div class="week-range" id="weekRange">—</div>
      </div>
      <button class="wbtn" onclick="changeWeek(1)">&#8250;</button>
      <button class="today-btn" onclick="goNow()">This Week</button>
    </div>
    <div class="week-grid" id="wGrid"></div>
  </div>
  <div class="right-panel" id="rightPanel">
    <div class="rp-prices">
      <div class="price-box"><div class="price-sym">SPY</div><div class="price-val" id="pSPY">—</div><div class="price-chg flat" id="cSPY">—</div></div>
      <div class="price-box"><div class="price-sym">QQQ</div><div class="price-val" id="pQQQ">—</div><div class="price-chg flat" id="cQQQ">—</div></div>
      <div class="price-box"><div class="price-sym">BTC</div><div class="price-val" id="pBTC">—</div><div class="price-chg flat" id="cBTC">—</div></div>
    </div>
    <div id="feedPane" style="display:flex;flex-direction:column;flex:1">
      <div class="feed-hd"><span>Earnings Feed</span><span class="feed-sub" id="feedSub"></span></div>
      <div id="feedList"></div>
    </div>
    <div id="sdPane" style="display:none;flex:1;flex-direction:column" class="sd">
      <!-- EarningsHub-style top card -->
      <div class="ec-card" id="ecCard">
        <div class="ec-card-head">
          <div class="ec-card-logo" id="sdLogo">
            <div class="ec-card-logo-fb" id="sdFb"></div>
          </div>
          <div class="ec-card-title">
            <div class="ec-card-name" id="sdTicker"></div>
            <div class="ec-card-ago" id="sdWhen"></div>
          </div>
          <button class="ec-card-x" onclick="closeDetail()">&#10005;</button>
        </div>
        <div id="ecPriceStrip" class="ec-price-loading">Loading price…</div>
        <div class="ec-card-tabs">
          <div class="ec-card-tab on">Results</div>
          <div class="ec-card-tab">Price Move <span class="pro-badge">Pro</span></div>
        </div>
        <div class="ec-results" id="ecResults"></div>
        <div class="ec-footnote" id="ecFootnote"></div>
        <div class="ec-actions">
          <button class="ec-play">&#9654;</button>
          <button class="ec-act-btn">&#9646;&#9646; Slides <span class="plus-badge">Plus</span></button>
          <button class="ec-act-btn">&#9741; Report <span class="plus-badge">Plus</span></button>
          <button class="ec-act-btn">&#9741; Transcript <span class="plus-badge">Plus</span></button>
          <button class="ec-share">&#8679;</button>
        </div>
      </div>
      <!-- Summary metrics strip -->
      <div class="sd-metrics-strip" id="sdMet"></div>
      <!-- History tabs -->
      <div class="sd-tabs">
        <div class="sd-tab on" data-tab="0" onclick="switchTab(0,this)">History</div>
        <div class="sd-tab" data-tab="1" onclick="switchTab(1,this)">News</div>
      </div>
      <div class="sd-pane on" id="paneEarnings"></div>
      <div class="sd-pane" id="paneNews"></div>
    </div>
  </div>
</div>
<script>
const DATA=__EARNINGS_JS__;
const PAST_DATA=__PAST_EARNINGS_JS__;
const HISTORY=__HISTORY_JS__;
const REVENUE=__REVENUE_JS__;
const REV_EST=__REV_EST_JS__;
const EPS_EST=__EPS_EST_JS__;
const NEWS=__NEWS_JS__;
const META=__META_JS__;
const BUILT_AT=__BUILT_AT__;

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmtM(v){if(v==null||v===0)return'—';return v>=1000?'$'+(v/1000).toFixed(2)+'B':'$'+v.toFixed(2)+'M';}
function fmtMcap(v){if(!v||v<1e6)return'—';if(v>=1e12)return'$'+(v/1e12).toFixed(2)+'T';if(v>=1e9)return'$'+(v/1e9).toFixed(1)+'B';return'$'+(v/1e6).toFixed(0)+'M';}
function pmcap(s){if(!s)return 0;try{return parseFloat(s.replace(/[$,]/g,''));}catch{return 0;}}
function qLbl(s){if(!s)return'';const p=s.split(' ');const m=p[0],y=p[1]||'';const qi={Jan:4,Feb:4,Mar:1,Apr:1,May:2,Jun:2,Jul:2,Aug:3,Sep:3,Oct:3,Nov:4,Dec:4};return'Q'+(qi[m]||'?')+' '+(y?y.slice(2):'');}

const LOGO_COLORS=['#7c3aed','#2563eb','#16a34a','#dc2626','#d97706','#0891b2','#c026d3','#0f766e'];
function lcolor(sym){let h=0;for(const c of (sym||''))h=(h*31+c.charCodeAt(0))&0xffffff;return LOGO_COLORS[Math.abs(h)%LOGO_COLORS.length];}
function logoHtml(sym,sz){
  sz=sz||44;
  const src=`https://assets.parqet.com/logos/symbol/${encodeURIComponent(sym)}?format=png`;
  const col=lcolor(sym);const fb=(sym||'??').slice(0,2).toUpperCase();
  return `<div class="logo-img-wrap" style="width:${sz}px;height:${sz}px;border-radius:${Math.round(sz*.18)}px">
    <img src="${esc(src)}" loading="lazy" onerror="this.style.display='none'">
    <div class="logo-fb" style="background:${col};font-size:${Math.round(sz*.26)}px">${fb}</div>
  </div>`;

// Week state
let wOff=0;
const TODAY=new Date();
const TODAY_ISO=TODAY.toISOString().split('T')[0];
let selSym=null;
const DAYS=['Mon','Tue','Wed','Thu','Fri'];
const MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function weekDates(off){
  const d=new Date(TODAY);
  const dow=d.getDay()||7;
  d.setDate(d.getDate()-(dow-1)+off*7);
  const out=[];
  for(let i=0;i<5;i++){const x=new Date(d);x.setDate(d.getDate()+i);out.push(x.toISOString().split('T')[0]);}
  return out;
}
function fmtWR(dates){
  const a=new Date(dates[0]+'T12:00:00'),b=new Date(dates[4]+'T12:00:00');
  if(a.getMonth()===b.getMonth())return MONTHS[a.getMonth()]+' '+a.getDate()+'–'+b.getDate()+', '+b.getFullYear();
  return MONTHS[a.getMonth()]+' '+a.getDate()+' – '+MONTHS[b.getMonth()]+' '+b.getDate()+', '+b.getFullYear();
}
function changeWeek(d){wOff+=d;renderWeek();}
function goNow(){wOff=0;renderWeek();}

function getRows(iso){return iso<=TODAY_ISO?(PAST_DATA[iso]||[]):(DATA[iso]||[]);}

function renderWeek(){
  const dates=weekDates(wOff);
  document.getElementById('weekRange').textContent=fmtWR(dates);
  const grid=document.getElementById('wGrid');
  grid.innerHTML='';
  dates.forEach((iso,i)=>{
    const d=new Date(iso+'T12:00:00');
    const isToday=iso===TODAY_ISO;
    const isPast=iso<TODAY_ISO;
    const rows=getRows(iso);
    const col=document.createElement('div');
    col.className='day-col'+(isToday?' today-col':'');
    const hd=document.createElement('div');
    hd.className='day-hd'+(isToday?' today-hd':'');
    hd.innerHTML=DAYS[i]+' <span class="day-num'+(isToday?' today-num':'')+'">'+d.getDate()+'</span>';
    col.appendChild(hd);
    if(!rows.length){
      const ne=document.createElement('div');ne.className='no-earn';ne.textContent='No Earnings';col.appendChild(ne);
    } else if(isPast){
      const sorted=[...rows].sort((a,b)=>pmcap(b.marketCap)-pmcap(a.marketCap));
      col.appendChild(makeSection('&#9728; Reported',sorted));
    } else {
      const pre=rows.filter(r=>r.time==='time-pre-market');
      const aft=rows.filter(r=>r.time==='time-after-hours');
      const unk=rows.filter(r=>r.time!=='time-pre-market'&&r.time!=='time-after-hours');
      if(pre.length)col.appendChild(makeSection('&#9728; Before Open',pre));
      if(aft.length)col.appendChild(makeSection('&#9790; After Hours',aft));
      if(unk.length&&!pre.length&&!aft.length)col.appendChild(makeSection('&#9679; Unconfirmed',unk));
    }
    grid.appendChild(col);
  });
  buildFeed(dates);
}

function makeSection(label,rows){
  const sec=document.createElement('div');
  const hd=document.createElement('div');hd.className='sec-hd';hd.innerHTML=label;sec.appendChild(hd);
  const wrap=document.createElement('div');wrap.className='logos-wrap';
  const show=rows.slice(0,12);
  show.forEach(r=>{
    const card=document.createElement('div');
    card.className='logo-card'+(selSym===r.symbol?' sel':'');
    card.innerHTML=logoHtml(r.symbol,42)+'<span class="logo-sym">'+esc(r.symbol)+'</span>';
    card.onclick=()=>openStock(r.symbol);
    wrap.appendChild(card);
  });
  if(rows.length>12){const m=document.createElement('div');m.className='more-lbl';m.textContent='+'+( rows.length-12)+' more';wrap.appendChild(m);}
  sec.appendChild(wrap);
  return sec;
}

// Feed
function buildFeed(weekDates){
  const list=document.getElementById('feedList');
  list.innerHTML='';
  const items=[];
  for(let d=new Date(TODAY),limit=0;limit<60&&items.length<25;d.setDate(d.getDate()-1),limit++){
    const iso=d.toISOString().split('T')[0];
    const rows=PAST_DATA[iso]||[];
    rows.slice(0,10).forEach(r=>{
      const hArr=HISTORY[r.symbol]||[];
      const h=hArr.find(q=>{try{return new Date(q.dateReported+'T12:00').toISOString().split('T')[0]===iso;}catch{return false;}});
      items.push({...r,iso,rev:h?.revActual});
    });
  }
  document.getElementById('feedSub').textContent=items.length?'Recent Results':'';
  items.slice(0,20).forEach(item=>{
    const eps=parseFloat((item.eps||'').replace(/[$,]/g,''));
    const est=parseFloat((item.epsForecast||'').replace(/[$,]/g,''));
    const surp=parseFloat(item.surprise||0);
    const div=document.createElement('div');
    div.className='feed-item';
    div.onclick=()=>openStock(item.symbol);
    let rows='';
    if(!isNaN(eps)){
      rows+=`<div class="fi-grid">
        <span class="fi-lbl">EPS</span>
        <span class="fi-est">${!isNaN(est)?'$'+est.toFixed(2)+' est':''}</span>
        <span class="fi-act">$${eps.toFixed(2)}</span>
        <span class="fi-surp ${surp>0?'up':'dn'}">${surp>0?'+':''}${surp.toFixed(1)}%</span>
      </div>`;}
    if(item.rev!=null){
      rows+=`<div class="fi-grid">
        <span class="fi-lbl">REV</span>
        <span class="fi-est"></span>
        <span class="fi-act" style="color:var(--blue)">${fmtM(item.rev)}</span>
        <span class="fi-surp flat">—</span>
      </div>`;}
    div.innerHTML=`<div class="fi-head">
      <div class="fi-logo"><img src="https://assets.parqet.com/logos/symbol/${encodeURIComponent(item.symbol)}?format=png" loading="lazy" onerror="this.style.display='none'">
        <span class="fi-logo-fb" style="background:${lcolor(item.symbol)}">${(item.symbol||'??').slice(0,2)}</span></div>
      <div><div class="fi-title">${esc(item.symbol)} ${item.fiscalQuarterEnding?qLbl(item.fiscalQuarterEnding.replace('/',' ')):'Earnings'}</div>
        <div class="fi-sub">${esc(item.name||'')}</div></div>
    </div>${rows}`;
    list.appendChild(div);
  });
  if(!items.length)list.innerHTML='<div class="no-data">No recent data</div>';
}

// Build merged history
function mergeHist(sym){
  const cached=HISTORY[sym]||[];
  const seen=new Set(cached.map(q=>q.fiscalQtrEnd));
  const extra=[];
  Object.keys(PAST_DATA).sort().forEach(date=>{
    const row=(PAST_DATA[date]||[]).find(r=>r.symbol===sym);
    if(!row)return;
    const eps=parseFloat((row.eps||'').replace(/[$,]/g,''));
    const est=parseFloat((row.epsForecast||'').replace(/[$,]/g,''));
    const surp=parseFloat(row.surprise);
    if(isNaN(eps)&&isNaN(est))return;
    const qk=(row.fiscalQuarterEnding||date).replace('/',' ');
    if(seen.has(qk))return;
    seen.add(qk);
    extra.push({fiscalQtrEnd:qk,dateReported:date,eps:isNaN(eps)?null:eps,
      consensusForecast:isNaN(est)?'':String(est),
      percentageSurprise:isNaN(surp)?'':String(surp),revActual:null});
  });
  const all=[...extra,...cached];
  const byQ={};
  all.forEach(q=>{if(q.fiscalQtrEnd)byQ[q.fiscalQtrEnd]=q;});
  return Object.values(byQ).sort((a,b)=>{
    try{return new Date('01 '+b.fiscalQtrEnd)-new Date('01 '+a.fiscalQtrEnd);}catch{return 0;}
  });
}

function _nearestRev(dict, fqe){
  if(!dict||!fqe)return null;
  if(dict[fqe]!=null)return dict[fqe];
  try{
    const target=new Date('01 '+fqe);
    let bestClose=null,bestCloseDiff=999,bestPrior=null,bestPriorDiff=999;
    for(const[k,v] of Object.entries(dict)){
      const kd=new Date('01 '+k);
      const diff=Math.abs((kd.getFullYear()-target.getFullYear())*12+(kd.getMonth()-target.getMonth()));
      const signed=(target.getFullYear()-kd.getFullYear())*12+(target.getMonth()-kd.getMonth());
      if(diff<=2&&diff<bestCloseDiff){bestCloseDiff=diff;bestClose=v;}
      if(signed>0&&signed<=18&&signed<bestPriorDiff){bestPriorDiff=signed;bestPrior=v;}
    }
    return bestClose!=null?bestClose:bestPrior;
  }catch{return null;}
}

function openStock(sym){
  selSym=sym;
  document.querySelectorAll('.logo-card').forEach(c=>c.classList.toggle('sel',c.querySelector('.logo-sym')?.textContent===sym));
  document.getElementById('feedPane').style.display='none';
  const sd=document.getElementById('sdPane');
  sd.style.display='flex';

  const m=META[sym]||{};
  let name=m.name||'';
  if(!name){
    for(const iso of Object.keys(PAST_DATA)){
      const row=(PAST_DATA[iso]||[]).find(r=>r.symbol===sym);
      if(row&&row.name){name=row.name;break;}
    }
    if(!name){
      for(const iso of Object.keys(DATA)){
        const row=(DATA[iso]||[]).find(r=>r.symbol===sym);
        if(row&&row.name){name=row.name;break;}
      }
    }
  }

  // Logo — white bg card with fallback
  const sdL=document.getElementById('sdLogo');
  const sdFb=document.getElementById('sdFb');

  sdFb.textContent=(sym||'??').slice(0,2);
  const img=document.createElement('img');
  img.src=`https://assets.parqet.com/logos/symbol/${encodeURIComponent(sym)}?format=png`;
  img.loading='lazy';
  img.style.cssText='position:absolute;top:0;left:0;width:100%;height:100%;object-fit:contain';
  img.onerror=function(){this.style.display='none';};
  // remove old img if any
  sdL.querySelectorAll('img').forEach(el=>el.remove());
  sdL.insertBefore(img,sdFb);

  const hist=mergeHist(sym);
  const q0=hist[0]||{};

  // Card title: "SYM Q1 2026 Earnings" or "SYM Upcoming Earnings"
  const qLabel=qLbl(q0.fiscalQtrEnd||'');
  const upcoming=Object.keys(DATA).some(iso=>(DATA[iso]||[]).find(r=>r.symbol===sym));
  document.getElementById('sdTicker').textContent=sym+(name?' – '+name:'')+(qLabel?' '+qLabel+' Earnings':' Earnings');

  // Days ago / upcoming
  let whenStr='';
  let reportedIso='';
  for(const iso of Object.keys(PAST_DATA).sort().reverse()){
    if((PAST_DATA[iso]||[]).find(r=>r.symbol===sym)){reportedIso=iso;break;}
  }
  if(reportedIso){
    const diff=Math.round((new Date()-new Date(reportedIso+'T12:00:00'))/86400000);
    whenStr=diff===0?'Today':diff===1?'1d ago':diff+'d ago';
  } else {
    for(const iso of Object.keys(DATA)){
      const row=(DATA[iso]||[]).find(r=>r.symbol===sym);
      if(row){whenStr='Reports '+iso+(row.time==='time-pre-market'?' · Before Open':row.time==='time-after-hours'?' · After Hours':'');break;}
    }
  }
  document.getElementById('sdWhen').textContent=whenStr;

  // Populate REV/EPS card
  const _revDict=REVENUE[sym]||null;
  const _revEstDict=REV_EST[sym]||null;
  const _epsEstDict=EPS_EST[sym]||null;
  // Find rev estimate for a given fiscalQtrEnd
  function _revEst(fqe){
    if(!_revEstDict||!fqe)return null;
    if(_revEstDict[fqe]!=null)return _revEstDict[fqe];
    const vals=Object.values(_revEstDict);
    return vals.length?vals[0]:null;
  }
  // Find EPS estimate — exact match on quarter key only (no fallback; avoid showing wrong-quarter estimate)
  function _epsEst(fqe){
    if(!_epsEstDict||!fqe)return null;
    return _epsEstDict[fqe]!=null?_epsEstDict[fqe]:null;
  }
  // Detect upcoming
  const isUpcoming=Object.keys(DATA).some(iso=>(DATA[iso]||[]).find(r=>r.symbol===sym));

  let rows='';
  if(isUpcoming){
    const upEpsEst=(s=>{if(!s)return null;const neg=s.includes('(');const v=parseFloat(s.replace(/[^0-9.]/g,''));return isNaN(v)?null:(neg?-v:v);})(m.eps);
    const upRevEst=_revEstDict?fmtM(Object.values(_revEstDict)[0]||null):null;
    const upDate=m.date||'';
    const upWhen=m.when||'';
    rows+=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:14px 14px 10px">
      <div>
        <div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--faint)">EPS Estimate</div>
        <div style="font-size:22px;font-weight:800;color:var(--accent2);margin-top:3px">${upEpsEst!=null?'$'+upEpsEst.toFixed(2):'—'}</div>
      </div>
      <div>
        <div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--faint)">Rev Estimate</div>
        <div style="font-size:22px;font-weight:800;color:var(--blue);margin-top:3px">${upRevEst&&upRevEst!=='—'?upRevEst:'—'}</div>
      </div>
    </div>

    const revAct=q0.revActual||_nearestRev(_revDict, q0.fiscalQtrEnd)||null;

    const epsEst=q0.consensusForecast!=null&&q0.consensusForecast!==''?parseFloat(q0.consensusForecast):(!q0.eps||q0.eps===''?_epsEst(q0.fiscalQtrEnd):null);

    const revEstVal=_revEst(q0.fiscalQtrEnd);

    rows+=`<div class="ec-row">
      <div class="ec-metric">REV</div>

    </div>`;
    rows+=`<div class="ec-row-divider"></div>`;
    const epsColor=epsSurp!=null?(epsSurp>0?'var(--green)':'var(--red)'):'var(--muted)';
    const epsSurpStr=epsSurp!=null?(epsSurp>0?'+':'')+epsSurp.toFixed(2)+'%':'—';
    rows+=`<div class="ec-row">
      <div class="ec-metric">EPS<span style="color:var(--faint);font-size:10px">*</span></div>
      <div class="ec-est">${epsEst!=null?'$'+epsEst.toFixed(2)+' <span style=\'color:var(--faint);font-size:10px\'>(est)</span>':'—'}</div>
      <div class="ec-actual">${epsAct!=null?'$'+epsAct.toFixed(2):'—'}</div>

    document.getElementById('ecFootnote').textContent=epsAct!=null?'*Adjusted EPS vs consensus estimate':'';
    const tabs=document.querySelectorAll('.ec-card-tab');
    if(tabs[0])tabs[0].textContent='Results';
  }

  // Summary metrics strip
  const mc=pmcap((Object.values(PAST_DATA).flatMap(r=>r).find(r=>r.symbol===sym)||{}).marketCap||'')||
            pmcap((Object.values(DATA).flatMap(r=>r).find(r=>r.symbol===sym)||{}).marketCap||'');
  const revTTM=hist.slice(0,4).reduce((s,q)=>{
    const rv=q.revActual!=null?q.revActual:_nearestRev(_revDict,q.fiscalQtrEnd);
    return s+(rv||0);
  },0)||0;
  const epsTTM=hist.slice(0,4).reduce((s,q)=>s+(parseFloat(q.eps)||0),0)||0;
  const beatQ=hist.filter(q=>parseFloat(q.percentageSurprise)>0);

  document.getElementById('sdMet').innerHTML=`
    <div class="met"><div class="met-lbl">Mkt Cap</div><div class="met-val">${fmtMcap(mc)}</div></div>
    <div class="met"><div class="met-lbl">EPS TTM</div><div class="met-val">${epsTTM?'$'+epsTTM.toFixed(2):'—'}</div></div>
    <div class="met"><div class="met-lbl">REV TTM</div><div class="met-val">${revTTM?fmtM(revTTM):'—'}</div></div>
    <div class="met"><div class="met-lbl">Beat Rate</div><div class="met-val ${beatPct!=null?(beatPct>=50?'up':'dn'):''}">${beatPct!=null?beatPct+'%':'—'}</div></div>
    <div class="met"><div class="met-lbl">Quarters</div><div class="met-val">${totQ.length||'—'}</div></div>
    <div class="met"><div class="met-lbl">EPS Est</div><div class="met-val">${m.eps?'$'+m.eps:'—'}</div></div>`;

  switchTab(0,document.querySelector('.sd-tab'));
  buildEarnings(sym,hist,m,_revDict,_revEstDict,_epsEstDict);
  buildNews(sym);
  fetchLivePrice(sym);

function buildEarnings(sym,hist,m,_revDict,_revEstDict,_epsEstDict){
  const pane=document.getElementById('paneEarnings');
  if(!hist.length&&!m.date&&!m.eps){pane.innerHTML='<div class="no-data">No earnings history</div>';return;}
  const display=hist.slice(0,12);
  const hasRev=display.some(q=>(q.revActual!=null&&q.revActual>0)||(_nearestRev(_revDict,q.fiscalQtrEnd)!=null));
  const beats=display.filter(q=>parseFloat(q.percentageSurprise)>0).length;
  const tot=display.filter(q=>q.percentageSurprise!=='').length;

  // Upcoming slide
  let upcomingSlide='';
  if(m.date||m.eps){
    const epsEst=(s=>{if(!s)return null;const neg=s.includes('(');const v=parseFloat(s.replace(/[^0-9.]/g,''));if(isNaN(v))return null;return'$'+(neg?-v:v).toFixed(2);})(m.eps);
    const revEst=_revEstDict?fmtM(Object.values(_revEstDict)[0]||null):null;
    upcomingSlide=`<div class="qslide upcoming">
      <div>
        <div class="qslide-lbl">Upcoming</div>
        <div class="qslide-qtr">${esc(m.date||'')}</div>
        ${m.when?`<div style="font-size:10px;color:var(--accent2);opacity:.75">${esc(m.when)}</div>`:''}
      </div>
      <span class="qslide-badge upcoming-badge">Est</span>
      ${epsEst?`<div class="qslide-row"><span class="qslide-row-lbl">EPS</span><span class="qslide-row-val" style="color:var(--accent2)">${epsEst}</span></div>`:''}
      ${revEst&&revEst!=='—'?`<div class="qslide-row"><span class="qslide-row-lbl">Revenue</span><span class="qslide-row-val blue">${revEst}</span></div>`:''}
    </div>`;
  }

  // History slides
  const histSlides=display.map(q=>{
    const s=parseFloat(q.percentageSurprise);
    const hasSurp=q.percentageSurprise!==''&&q.percentageSurprise!=null&&!isNaN(s);
    const beat=hasSurp&&s>0;
    const epsCf=q.consensusForecast?parseFloat(q.consensusForecast):null;
    const epsEf=_epsEstDict&&_epsEstDict[q.fiscalQtrEnd]!=null?_epsEstDict[q.fiscalQtrEnd]:null;
    const epsEst=epsCf??epsEf;
    const revVal=q.revActual!=null?q.revActual:_nearestRev(_revDict,q.fiscalQtrEnd);
    const revEst=_revEstDict?(_revEstDict[q.fiscalQtrEnd]||null):null;
    return`<div class="qslide">
      <div>
        <div class="qslide-lbl">Quarter</div>
        <div class="qslide-qtr">${esc(q.fiscalQtrEnd||'')}</div>
      </div>
      ${hasSurp?`<span class="qslide-badge ${beat?'beat':'miss'}">${beat?'Beat':'Miss'}</span>`:'<span class="qslide-badge" style="background:rgba(255,255,255,.06);color:var(--faint)">—</span>'}
      <div class="qslide-row"><span class="qslide-row-lbl">EPS</span><span class="qslide-row-val">${q.eps!=null?'$'+parseFloat(q.eps).toFixed(2):'—'}</span></div>
      <div class="qslide-row"><span class="qslide-row-lbl">Est</span><span class="qslide-row-val muted">${epsEst!=null?'$'+epsEst.toFixed(2):'—'}</span></div>
      ${hasSurp?`<div class="qslide-surp ${beat?'beat':'miss'}">${(s>0?'+':'')+s.toFixed(1)}%</div>`:''}
      ${hasRev?`<div class="qslide-row" style="margin-top:3px"><span class="qslide-row-lbl">Rev</span><span class="qslide-row-val blue">${fmtM(revVal)}</span></div>`:''}
      ${hasRev?`<div class="qslide-row"><span class="qslide-row-lbl">Rev Est</span><span class="qslide-row-val muted">${fmtM(revEst)}</span></div>`:''}
    </div>`;
  }).join('');

  const beatStat=tot?`<div class="slides-beat-stat">Beat <strong>${beats}/${tot}</strong> quarters (${Math.round(beats/tot*100)}%)</div>`:'';

  const chartHtml=`<div class="chart-wrap">
    <div class="chart-legend">
      ${hasRev?'<div class="leg"><div class="leg-dot" style="background:var(--blue)"></div>Revenue</div>':''}
      <div class="leg"><div class="leg-dot" style="background:var(--green)"></div>EPS Beat</div>
      <div class="leg"><div class="leg-dot" style="background:var(--red)"></div>EPS Miss</div>
      <div class="leg"><div class="leg-dot" style="background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.3)"></div>Est</div>
    </div>
    <div class="chart-canvas-wrap"><canvas class="ec" id="ec_${esc(sym)}" width="320" height="155"></canvas></div>
  </div>`;

  pane.innerHTML=`<div class="slides-wrap">${upcomingSlide}${histSlides}</div>${beatStat}${chartHtml}`;
  setTimeout(()=>drawChart(sym,display,hasRev,_revDict),60);
}

function drawChart(sym,data,hasRev,_revDict){
  const canvas=document.getElementById('ec_'+sym);
  if(!canvas)return;
  const ctx=canvas.getContext('2d');
  const dpr=window.devicePixelRatio||1;
  const W=canvas.offsetWidth||320,H=155;
  canvas.width=W*dpr;canvas.height=H*dpr;
  ctx.scale(dpr,dpr);
  const pts=[...data].reverse();
  const N=pts.length;if(!N)return;
  const PAD={t:8,r:8,b:24,l:hasRev?44:4};
  const cW=W-PAD.l-PAD.r,cH=H-PAD.t-PAD.b;
  const gW=cW/N;
  const bW=Math.max(Math.floor(gW*.65),4);
  const maxRev=hasRev?Math.max(...pts.map(q=>q.revActual!=null?q.revActual:(_nearestRev(_revDict,q.fiscalQtrEnd)||0)),1):0;
  const maxEps=Math.max(...pts.flatMap(q=>[Math.abs(parseFloat(q.eps)||0),Math.abs(parseFloat(q.consensusForecast)||0)]),0.01);
  // Grid lines
  for(let i=0;i<=4;i++){
    const y=PAD.t+cH*(1-i/4);
    ctx.strokeStyle='rgba(255,255,255,.05)';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(PAD.l,y);ctx.lineTo(W-PAD.r,y);ctx.stroke();
    if(hasRev){
      ctx.fillStyle='rgba(255,255,255,.28)';ctx.font='8px sans-serif';ctx.textAlign='right';
      const v=maxRev*i/4;
      ctx.fillText(v>=1000?(v/1000).toFixed(0)+'B':v.toFixed(0)+'M',PAD.l-3,y+3);
    }
  }
  pts.forEach((q,i)=>{
    const cx=PAD.l+i*gW+gW/2;
    const eps=parseFloat(q.eps)||0;
    const est=parseFloat(q.consensusForecast)||0;
    const surp=parseFloat(q.percentageSurprise)||0;
    const rev=q.revActual!=null?q.revActual:(_nearestRev(_revDict,q.fiscalQtrEnd)||0);
    // Rev bar
    if(hasRev&&rev>0){
      const rh=Math.max((rev/maxRev)*cH,2);
      ctx.fillStyle='rgba(59,130,246,.55)';
      ctx.fillRect(cx-bW/2,PAD.t+cH-rh,bW,rh);
    }
    // EPS est outline
    if(est&&maxEps>0){
      const eh=Math.max((Math.abs(est)/maxEps)*cH*.44,2);
      const ew=Math.max(bW*.38,3);
      ctx.strokeStyle='rgba(255,255,255,.3)';ctx.lineWidth=1;
      ctx.strokeRect(cx-ew/2,PAD.t+cH-eh,ew,eh);
    }
    // EPS actual bar
    if(eps&&maxEps>0){
      const eh=Math.max((Math.abs(eps)/maxEps)*cH*.44,2);
      const ew=Math.max(bW*.36,3);
      ctx.fillStyle=surp>0?'rgba(34,197,94,.9)':'rgba(239,68,68,.85)';
      ctx.fillRect(cx-ew/2,PAD.t+cH-eh,ew,eh);
    }
    // Label
    const lbl=qLbl(q.fiscalQtrEnd||'');
    if(lbl&&(i===0||i===N-1||N<=8||(i%(Math.ceil(N/6))===0))){
      ctx.fillStyle='rgba(255,255,255,.3)';ctx.font='8px sans-serif';ctx.textAlign='center';
      ctx.fillText(lbl,cx,H-5);
    }
  });
}

function buildNews(sym){
  const pane=document.getElementById('paneNews');
  const arts=NEWS[sym];
  if(!arts||!arts.length){pane.innerHTML=`<div class="no-data">No news for ${esc(sym)}</div>`;return;}
  pane.innerHTML='<div class="news-wrap">'+arts.map(a=>`
    <div class="ni"><a href="${esc(a.link)}" target="_blank" rel="noopener">${esc(a.title)}</a>
    <div class="ni-meta">${esc(a.date)} · ${esc(a.time)}</div></div>`).join('')+'</div>';
}

function doSearch(q){
  q=(q||'').trim().toLowerCase();
  if(!q)return;
  const found=new Set();
  [...Object.values(DATA),...Object.values(PAST_DATA)].forEach(rows=>rows.forEach(r=>{
    if(r.symbol&&r.symbol.toLowerCase()===q)found.add(r.symbol);
  }));
  if(found.size===1)openStock([...found][0]);
  else if(found.size===0){
    [...Object.values(DATA),...Object.values(PAST_DATA)].forEach(rows=>rows.forEach(r=>{
      if(r.symbol&&r.symbol.toLowerCase().startsWith(q))found.add(r.symbol);
    }));
    if(found.size===1)openStock([...found][0]);
  }
}

// Market status
function setMkt(){
  const now=new Date();
  const et=new Date(now.toLocaleString('en-US',{timeZone:'America/New_York'}));
  const h=et.getHours(),min=et.getMinutes(),dow=et.getDay();
  const open=dow>=1&&dow<=5&&(h>9||(h===9&&min>=30))&&h<16;
  const dot=document.getElementById('mktDot');
  if(dot){dot.className='market-dot'+(open?' open':'');}
  const txt=document.getElementById('mktTxt');
  if(txt){txt.textContent=open?'Market Open':'Market Closed';}
}

// Live price for individual ticker
async function fetchLivePrice(sym){
  const el=document.getElementById('ecPriceStrip');
  if(!el)return;
  el.className='ec-price-loading';
  el.textContent='Loading price…';
  try{
    // Yahoo Finance quote API (works browser-side, 15-min delayed outside market hours)
    const r=await fetch(
      `https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(sym)}?interval=1d&range=1d`,
      {headers:{Accept:'application/json'}});
    const d=await r.json();
    const meta=d?.chart?.result?.[0]?.meta;
    if(!meta){el.textContent='';return;}
    const price=meta.regularMarketPrice||meta.previousClose;
    const prev=meta.previousClose||meta.chartPreviousClose;
    const chg=price&&prev?price-prev:null;
    const pct=chg&&prev?(chg/prev*100):null;
    const up=chg!=null&&chg>=0;
    el.className='ec-price-strip';
    el.innerHTML=`<span class="ec-price-val">$${price!=null?price.toFixed(2):'—'}</span>`+
      (pct!=null?`<span class="ec-price-chg ${up?'up':'dn'}">${up?'+':''}${chg.toFixed(2)} (${up?'+':''}${pct.toFixed(2)}%)</span>`:'');
  }catch{el.textContent='';}
}

// Prices
async function fetchETF(sym,pId,cId){
  try{
    const r=await fetch(`https://api.nasdaq.com/api/quote/${sym}/info?assetclass=etf`,
      {headers:{Accept:'application/json','User-Agent':'Mozilla/5.0'}});
    const d=await r.json();
    const p=d?.data?.primaryData;
    if(!p)return;
    const up=!(p.netChange||'').startsWith('-');
    document.getElementById(pId).textContent=p.lastSalePrice||'—';
    const el=document.getElementById(cId);
    el.textContent=(p.netChange||'')+(p.percentageChange?' ('+p.percentageChange+')':'');
    el.className='price-chg '+(up?'up':'dn');
  }catch{}
}

// 3. Auto-reload when a new build is deployed (check every 2 min)
let _pageEtag='';
async function checkBuildUpdate(){
  try{
    const r=await fetch(location.pathname,{method:'HEAD',cache:'no-cache'});
    const tag=r.headers.get('etag')||r.headers.get('last-modified')||'';
    if(_pageEtag&&tag&&tag!==_pageEtag){location.reload();}
    if(tag)_pageEtag=tag;
  }catch{}
}
