name: Build Earnings Calendar

on:
  schedule:
    # Every hour Mon–Fri between 4 AM and 11 PM ET (9 AM–4 AM UTC)
    - cron: '0 9-23 * * 1-5'   # 9 AM–11 PM UTC weekdays
    - cron: '0 0-4 * * 2-6'    # midnight–4 AM UTC (Mon–Sat = Tue–Sat local next day)
  workflow_dispatch:            # allow manual trigger from GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build HTML
        run: python build.py

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          git diff --staged --quiet || git commit -m "Auto-update: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
