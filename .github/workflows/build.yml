name: Build Earnings Calendar

on:
  schedule:
    # Every hour 9 AM–11 PM UTC Mon–Fri (covers US market hours)
    - cron: '0 9-23 * * 1-5'
    # Every hour midnight–4 AM UTC Tue–Sat (covers US after-hours Mon–Fri)
    - cron: '0 0-4 * * 2-6'
    # Extra half-hour runs during pre-market (12-14 UTC = 8-10 AM ET) and after-hours (20-24 UTC = 4-8 PM ET)
    - cron: '30 12-14 * * 1-5'
    - cron: '30 20-23 * * 1-5'
    - cron: '30 0-1 * * 2-6'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Pull latest (ensure we have newest template)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance

      - name: Build HTML
        run: python build.py

      - name: Commit and push
        run: |
          git add docs/index.html data/history_cache.json data/past_calendar_cache.json data/revenue_cache.json data/rev_est_cache.json data/eps_est_cache.json
          git diff --staged --quiet || git commit -m "Auto-update: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push || (git pull --rebase origin main && git push)
