name: Build Earnings Calendar

on:
  schedule:
    - cron: '* * * * *'   # GitHub runs ~every 5 min as floor
  workflow_dispatch:

concurrency:
  group: build
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Pull latest
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-yfinance-${{ runner.os }}

      - name: Install dependencies
        run: pip install yfinance

      - name: Build HTML
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
        run: python build.py

      - name: Commit and push
        run: |
          git add docs/index.html data/history_cache.json data/past_calendar_cache.json data/revenue_cache.json data/rev_est_cache.json data/eps_est_cache.json data/fmp_est_cache.json || true
          git diff --staged --quiet || git commit -m "Auto-update: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push || (git pull --rebase origin main && git push)

      - name: Trigger next build in 60s
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          sleep 60
          curl -s -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/build.yml/dispatches" \
            -d '{"ref":"main"}'
          echo "Next build triggered"
