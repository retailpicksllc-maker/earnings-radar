name: Build Earnings Calendar

on:
  schedule:
    - cron: '* * * * *'   # GitHub enforces 5-min minimum; external cron handles true 1-min
  workflow_dispatch:

concurrency:
  group: build
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Pull latest
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-yfinance-${{ runner.os }}

      - name: Install dependencies
        run: pip install yfinance

      - name: Build HTML
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
        run: python build.py

      - name: Commit and push
        run: |
          git add docs/index.html data/history_cache.json data/past_calendar_cache.json data/revenue_cache.json data/rev_est_cache.json data/eps_est_cache.json data/fmp_est_cache.json || true
          git diff --staged --quiet || git commit -m "Auto-update: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push || (git pull --rebase origin main && git push)
